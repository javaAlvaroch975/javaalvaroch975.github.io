<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyecto Multimedia</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <a href="#main" class="skip-link">Saltar al contenido principal</a>
    <header>
        <h1>Proyecto Multimedia</h1>
    </header>
    <main id="main">
        <section class="enlaces-video-audio">
            <div class="tarjeta-logo">
                <h2>Logo</h2>
                <img src="./Logotipo/logo.png" alt="Logotipo" class="logo">
            </div>
            <div class="tarjeta-contenido">
                <h2>Ver Audio</h2>
                <div class="seccion-centrada">
                    <audio controls style="width: 100%; max-width: 400px; margin-top: 16px;">
                        <source src="./Audio/Mix-pistas.ogg" type="audio/ogg">
                        Tu navegador no soporta el elemento de audio.
                    </audio>
                </div>
            </div>
            <div class="tarjeta-contenido">
                <h2>Video Shortcut</h2>
                <div class="seccion-centrada">
                    <video width="320" height="180" controls style="margin-top: 16px; max-width: 100%;">
                        <source src="./Video/Video Alvaro Multimedia.mp4" type="video/mp4">
                        Tu navegador no soporta el elemento de video.
                    </video>
                </div>
            </div>
            <div class="tarjeta-contenido">
                <h2>Video YouTube</h2>
                <div class="seccion-centrada">
                    <iframe width="320" height="180" src="https://www.youtube.com/embed/JiJZ83cL4Zo" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen style="margin-top: 16px; max-width: 100%;"></iframe>
                </div>
            </div>
            <div class="tarjeta-contenido">
                <h2>Firma</h2>
                <div class="seccion-centrada">
                    <svg width="300" height="200">
                        <polygon points="100,10 40,198 190,78 10,78 160,198" style="fill:lime;stroke:purple;stroke-width:5;fill-rule:evenodd;"></polygon>
                        <text x="72" y="125" font-family="Arial" font-size="45" fill="purple" font-weight="bold">
                            AC
                        </text>
                    </svg>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
